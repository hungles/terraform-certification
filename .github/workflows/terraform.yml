name: Terraform CI/CD

on:
  pull_request:
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
      - dev
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.8.5
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}

jobs:
  detect-changed-tf:
    name: Detect changed Terraform directory
    runs-on: ubuntu-latest
    outputs:
      tf_working_dir: ${{ steps.detect.outputs.tf_working_dir }}
      has_tf_changes: ${{ steps.detect.outputs.has_tf_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Terraform files
        id: detect
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            echo "base_sha=$base_sha"
            echo "head_sha=$head_sha"
            git fetch --no-tags --prune --depth=1 origin "$base_sha"
            changed_files=$(git diff --name-only "$base_sha" "$head_sha" || true)
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ -n "${before:-}" ]]; then
              git fetch --no-tags --prune --depth=1 origin "$before"
              changed_files=$(git diff --name-only "$before" "$after" || true)
            else
              changed_files=$(git diff --name-only HEAD^ HEAD || true)
            fi
          fi
          echo "changed_files=$changed_files"
          tf_dirs=$(printf '%s\n' "$changed_files" | grep -E '\.tf$' | xargs -n1 dirname | sort -u || true)
          if [[ -z "$tf_dirs" ]]; then
            echo "has_tf_changes=false" >> "$GITHUB_OUTPUT"
            echo "tf_working_dir=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          selected_dir=$(printf '%s\n' "$tf_dirs" | head -n1)
          echo "has_tf_changes=true" >> "$GITHUB_OUTPUT"
          echo "tf_working_dir=$selected_dir" >> "$GITHUB_OUTPUT"

      - name: Show selected Terraform directory
        if: steps.detect.outputs.has_tf_changes == 'true'
        run: |
          echo "Selected Terraform working directory: ${{ steps.detect.outputs.tf_working_dir }}"

  terraform-format:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    needs: detect-changed-tf
    if: needs.detect-changed-tf.outputs.has_tf_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: terraform fmt -check -recursive

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [detect-changed-tf, terraform-format]
    if: needs.detect-changed-tf.outputs.has_tf_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: terraform validate

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [detect-changed-tf, terraform-validate]
    if: needs.detect-changed-tf.outputs.has_tf_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: |
          set -euo pipefail
          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET secret is required for remote state." >&2
            exit 1
          fi
          tf_key="${{ needs.detect-changed-tf.outputs.tf_working_dir }}/terraform.tfstate"
          init_args=( -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${tf_key}" -backend-config="region=${AWS_REGION}" -backend-config="encrypt=true" )
          if [[ -n "${TF_STATE_LOCK_TABLE}" ]]; then
            init_args+=( -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" )
          fi
          terraform init "${init_args[@]}"

      - name: Terraform plan
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: terraform plan -input=false -no-color -var="aws_region=${{ env.AWS_REGION }}" -out="${{ github.workspace }}/tfplan"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/tfplan

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [detect-changed-tf, terraform-plan]
    if: needs.detect-changed-tf.outputs.has_tf_changes == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ github.workspace }}/artifacts

      - name: Terraform init
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: |
          set -euo pipefail
          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET secret is required for remote state." >&2
            exit 1
          fi
          tf_key="${{ needs.detect-changed-tf.outputs.tf_working_dir }}/terraform.tfstate"
          init_args=( -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${tf_key}" -backend-config="region=${AWS_REGION}" -backend-config="encrypt=true" )
          if [[ -n "${TF_STATE_LOCK_TABLE}" ]]; then
            init_args+=( -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" )
          fi
          terraform init "${init_args[@]}"

      - name: Terraform apply
        working-directory: ${{ needs.detect-changed-tf.outputs.tf_working_dir }}
        run: terraform apply -auto-approve -input=false ${{ github.workspace }}/artifacts/tfplan
