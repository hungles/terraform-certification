name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Escribe DESTROY para confirmar el borrado"
        required: true
        type: string
      target:
        description: "Qué infraestructura destruir"
        required: true
        default: all
        type: choice
        options:
          - all
          - dev/instances
          - dev/network

permissions:
  contents: read

env:
  TF_VERSION: 1.8.5
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "Debes escribir DESTROY para confirmar el destroy."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy Terraform infrastructure
        shell: bash
        run: |
          set -euo pipefail

          target="${{ github.event.inputs.target }}"
          if [[ "$target" == "all" ]]; then
            dirs=("dev/instances" "dev/network")
          else
            dirs=("$target")
          fi

          for dir in "${dirs[@]}"; do
            if [[ ! -d "$dir" ]]; then
              echo "Directorio no encontrado: $dir"
              exit 1
            fi

            echo "Destruyendo infraestructura en $dir"
            terraform -chdir="$dir" init -input=false
            terraform -chdir="$dir" destroy -auto-approve -input=false -var="aws_region=${AWS_REGION}"
          done
