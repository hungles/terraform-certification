name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Escribe DESTROY para confirmar el borrado"
        required: true
        type: string
      target:
        description: "Qué infraestructura destruir"
        required: true
        default: all
        type: choice
        options:
          - all
          - dev/instances
          - dev/network

permissions:
  contents: read

env:
  TF_VERSION: 1.8.5
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "Debes escribir DESTROY para confirmar el destroy."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy Terraform infrastructure
        shell: bash
        run: |
          set -euo pipefail

          target="${{ github.event.inputs.target }}"
          if [[ "$target" == "all" ]]; then
            dirs=("dev/instances" "dev/network")
          else
            dirs=("$target")
          fi

          for dir in "${dirs[@]}"; do
            if [[ ! -d "$dir" ]]; then
              echo "Directorio no encontrado: $dir"
              exit 1
            fi

            echo "Destruyendo infraestructura en $dir"
            if [[ -z "${TF_STATE_BUCKET}" ]]; then
              echo "TF_STATE_BUCKET secret is required for remote state." >&2
              exit 1
            fi
            tf_key="$dir/terraform.tfstate"
            init_args=( -reconfigure -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${tf_key}" -backend-config="region=${AWS_REGION}" -backend-config="encrypt=true" )
            if [[ -n "${TF_STATE_LOCK_TABLE}" ]]; then
              init_args+=( -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" )
            fi
            terraform -chdir="$dir" init "${init_args[@]}"
            echo "directorio=$dir"
            ls
            var_file=$(find . -maxdepth 1 -type f \( -name '*.tfvars' -o -name '*.tfvars.json' \) | head -n 1)

            pwd
            echo "varfile=$var_file"
            if [[ -n "$var_file" ]]; then
                terraform -chdir="$dir" destroy -auto-approve -input=false -var-file="$var_file" -var="aws_region=${AWS_REGION}"
            else
                terraform -chdir="$dir" destroy -auto-approve -input=false -var="aws_region=${AWS_REGION}"
            fi
          done
